<!DOCTYPE html>
<html lang="en" class="dark" style="color-scheme: dark; background: #000">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZARDONIC</title>
    <meta name="description" content="ZARDONIC – Official Website." />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <meta property="og:title" content="ZARDONIC" />
    <meta property="og:description" content="ZARDONIC – Official Website." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:site_name" content="ZARDONIC" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZARDONIC" />
    <meta name="twitter:description" content="ZARDONIC – Official Website." />
    <meta name="twitter:image" content="/og-image.png" />
    <link rel="canonical" href="https://zardonic.com/" />
    <link rel="icon" type="image/webp" href="/src/assets/images/meta_eyJzcmNCdWNrZXQiOiJiemdsZmlsZXMifQ==.webp" />
    <!-- Font preconnect & prefetch — improves FCP by initiating font requests early -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Preload the Google Fonts CSS so the browser fetches it in parallel with other resources -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- DNS prefetch for external data APIs used at runtime -->
    <link rel="dns-prefetch" href="https://rest.bandsintown.com">
    <link rel="dns-prefetch" href="https://itunes.apple.com">
    <link rel="dns-prefetch" href="https://api.song.link">
    <link rel="dns-prefetch" href="https://api.spotify.com">
    <link href="/src/main.css" rel="stylesheet" />
    <!-- FOUC prevention: hide #root until React has mounted and added
         the 'hydrated' class. This prevents raw DOM from flashing through
         between the browser parse and the first React paint. The transition
         is kept at 0ms so there is no perceptible delay — it only prevents
         the single-frame flash between browser-rendered HTML and React. -->
    <style>
      #root:not(.hydrated) { opacity: 0; }
      #root.hydrated { opacity: 1; }
    </style>
</head>

<body>
    <!-- Restore persisted theme CSS variables before React mounts (prevents
         default-colour flash). Loaded as an external script to comply with
         Content-Security-Policy script-src 'self'. -->
    <script src="/theme-restore.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
