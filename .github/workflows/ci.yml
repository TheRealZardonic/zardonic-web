name: CI - Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify-and-build:
    name: Verify & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        # 'npm ci' uses package-lock.json strictly — no unexpected minor updates
        # that could break the build.

      - name: Security Audit
        run: npm audit --audit-level=moderate

      - name: Type Checking
        run: npm run typecheck
        # Catches TypeScript errors that Vite silently ignores during development
        # but that would cause Vercel to reject the build.

      - name: Linting
        run: npm run lint
        # Enforces eslint.config.js rules.

      - name: Run Unit Tests
        run: npm test
        # Runs all tests in src/test/ via Vitest.

      - name: Test Build (Vite)
        run: npm run build
        # The final gate — if this passes, Vercel will pass too.
